name: news_crawler

on:
  schedule:
    # 北京时间 21:00 和 7:00 (UTC 13:00 / 23:00)
    - cron: '0 13,23 * * *'
  workflow_dispatch:

jobs:
  crawl-and-commit:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install aiohttp beautifulsoup4 lxml

      - name: Run News Crawler
        run: python scripts/news_crawler.py 2

      - name: Commit & Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add _posts/
          git diff --cached --quiet || git commit -m "Auto Update: News posts $(date +%Y-%m-%d)"
          git push
