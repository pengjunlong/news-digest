<style>
    /* 基础样式 */
    .home-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 2rem 1rem;
    }

    /* 文章网格布局 */
    .post-grid {
        display: grid;
        gap: 2rem;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        margin-bottom: 3rem;
    }

    /* 文章卡片样式 */
    .post-card {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 3px 6px rgba(0,0,0,0.1);
        transition: transform 0.2s ease;
        overflow: hidden;
    }

    .post-card:hover {
        transform: translateY(-5px);
    }

    .post-image {
        width: 100%;
        height: 200px;
        object-fit: cover;
        border-radius: 12px 12px 0 0;
    }

    .post-content {
        padding: 1.5rem;
    }

    .post-title {
        font-size: 1.25rem;
        margin: 0 0 0.75rem;
        color: #2c3e50;
    }

    .post-meta {
        display: flex;
        justify-content: space-between;
        font-size: 0.875rem;
        color: #7f8c8d;
        margin-bottom: 1rem;
    }

    .post-excerpt {
        font-size: 0.95rem;
        line-height: 1.6;
        color: #34495e;
        margin: 0;
    }

    /* 分页导航 */
    .pagination {
        display: flex;
        justify-content: center;
        gap: 1.5rem;
        padding: 2rem 0;
        border-top: 1px solid #eee;
    }

    .pagination a {
        color: #3498db;
        text-decoration: none;
        padding: 0.5rem 1rem;
        border-radius: 6px;
        transition: background 0.2s ease;
    }

    .pagination a:hover {
        background: #f8f9fa;
    }

    .pagination-current {
        color: #7f8c8d;
        align-self: center;
    }

    /* 移动端适配 */
    @media (max-width: 768px) {
        .post-grid {
            grid-template-columns: 1fr;
        }

        .post-image {
            height: 150px;
        }

        .pagination {
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }
    }

    /* 深色模式支持 */
    @media (prefers-color-scheme: dark) {
        .post-card {
            background: #2c2c2c;
        }

        .post-title,
        .post-excerpt {
            color: #ecf0f1;
        }

        .post-meta {
            color: #bdc3c7;
        }
    }
</style>
